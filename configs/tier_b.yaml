tier: B
n_scenes: 5000             # only used when sampling on the fly
n_frames: 16               # 8/16/32 are the variants from the plan
image_size: 448
min_objects: 3
max_objects: 8
working_volume:
  x: [-4.0, 4.0]
  y: [-4.0, 4.0]
floor_z: 0.0
min_gap: 0.2              # edge-to-edge gap between objects (pairwise r_i+r_j+gap)
shapes: [cube, sphere, cylinder]
colors:
  red:     [220, 50, 50]
  green:   [60, 180, 75]
  blue:    [60, 90, 220]
  yellow:  [230, 210, 50]
  cyan:    [70, 200, 220]
  magenta: [200, 80, 200]
  orange:  [240, 140, 40]
  purple:  [130, 70, 180]
sizes:
  small: 0.4
  medium: 0.6
  large: 0.8
background_gray: 155
trajectory:
  window_world_size: 4.0    # square crop side, in world units (half of working volume)
  step_sigma: 1.2           # std-dev of per-frame center delta
  momentum: 0.55            # AR(1) coefficient on velocity (smoothness)
  zoom_sigma: 0.0           # set > 0 to vary window size per frame
  out_of_bounds: clamp      # "clamp" keeps the window inside the working volume
temporal_shuffle: false
