tier: C
n_scenes: 5000             # only used in single-step mode (no --scenes-in)
n_frames: 16
image_size: 448
min_objects: 3
max_objects: 8
working_volume:
  x: [-4.0, 4.0]
  y: [-4.0, 4.0]
floor_z: 0.0
min_separation: 1.2
shapes: [cube, sphere, cylinder]
colors:
  red:     [220, 50, 50]
  green:   [60, 180, 75]
  blue:    [60, 90, 220]
  yellow:  [230, 210, 50]
  cyan:    [70, 200, 220]
  magenta: [200, 80, 200]
  orange:  [240, 140, 40]
  purple:  [130, 70, 180]
sizes:
  small: 0.4
  medium: 0.6
  large: 0.8
background_gray: 155
fov_degrees: 60.0
trajectory:
  # Two orbit configurations indexed by traj_idx so each scene can be
  # rendered under multiple independent trajectories (H2 test).
  radii:      [8.0, 9.0]
  altitudes:  [3.5, 4.5]
  look_at_z:  0.5
  arc_degrees: 180.0
